# Generate a CycloneDX Software Bill of Materials (SBOM) for each release tag,
# upload it as a build artifact, and attach it to the GitHub Release.
# https://github.com/CycloneDX/cyclonedx-python

name: SBOM (CycloneDX)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  sbom:
    name: Generate and publish SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install cyclonedx-bom
        # Pinned so the SBOM tool itself is reproducible across releases. Bump in lockstep
        # with a deliberate test run; do not auto-upgrade. (Reviewer MAJOR-4)
        run: python -m pip install --upgrade pip "cyclonedx-bom==6.1.4"

      - name: Compile pinned requirements from pyproject.toml
        run: uv pip compile pyproject.toml -o requirements.txt

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py requirements requirements.txt -o bom.json --schema-version 1.5

      - name: Upload SBOM as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flightdeck-sbom-${{ github.ref_name }}
          path: bom.json
          retention-days: 90

      - name: Attach SBOM to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bom.json
