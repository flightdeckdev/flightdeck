name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Test
        run: python -m pytest

      - name: JSON Schemas drift check
        run: |
          python scripts/generate_schemas.py
          git diff --exit-code schemas/

      - name: Quickstart smoke (cross-platform)
        run: python scripts/quickstart_smoke.py

      - name: CLI smoke
        run: flightdeck --help

  test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Test
        run: python -m pytest

      - name: JSON Schemas drift check
        run: |
          python scripts/generate_schemas.py
          git diff --exit-code schemas/

      - name: Quickstart smoke (cross-platform)
        run: python scripts/quickstart_smoke.py

      - name: CLI smoke
        run: flightdeck --help
