name: Bug report
description: Report a reproducible problem with FlightDeck.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, inputs, and output needed to reproduce.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: FlightDeck version or commit.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and relevant setup details.
