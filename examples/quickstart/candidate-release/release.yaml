api_version: v1
kind: Release
metadata:
  name: support-agent
  version: candidate
  description: Candidate support agent release with different pricing assumptions.
spec:
  agent:
    agent_id: agent_support
  runtime:
    provider: openai
    model: gpt-4.1-mini
    temperature: 0.2
    max_output_tokens: 800
  prompts:
    system_ref: prompts/system.md
  pricing_reference:
    provider: openai
    pricing_version: candidate-pricing
  tags:
    env: local
    example: quickstart
